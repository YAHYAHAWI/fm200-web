<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FM-200 Calculator</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>FM-200 Calculator</h1>
        <p class="subtitle">
          Connected to Railway n8n webhook
        </p>

        <div class="grid">
          <div class="field">
            <label>Project Name</label>
            <input id="projectName" type="text" placeholder="Project Name" />
          </div>

          <div class="field">
            <label>Client Name</label>
            <input id="clientName" type="text" placeholder="Client Name" />
          </div>

          <div class="field">
            <label>Engineer Name</label>
            <input id="engineerName" type="text" placeholder="Engineer Name" />
          </div>

          <div class="field">
            <label>Email</label>
            <input id="email" type="email" placeholder="Email" />
          </div>

          <div class="field">
            <label>Room Length (m)</label>
            <input id="roomLength" type="number" placeholder="Length" />
          </div>

          <div class="field">
            <label>Room Width (m)</label>
            <input id="roomWidth" type="number" placeholder="Width" />
          </div>

          <div class="field">
            <label>Room Height (m)</label>
            <input id="roomHeight" type="number" placeholder="Height" />
          </div>

          <div class="field">
            <label>Agent Type</label>
            <select id="agentType">
              <option value="FM-200">FM-200</option>
              <option value="FK-5-1-12">FK-5-1-12</option>
            </select>
          </div>
        </div>

        <div class="summary">
          <strong>Room Volume:</strong>
          <span id="volumeValue">0</span> m³
        </div>

        <div class="actions">
          <button id="runBtn">Run Calculation</button>
        </div>

        <h3>Webhook Response</h3>
        <pre id="resultBox">No response yet.</pre>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
