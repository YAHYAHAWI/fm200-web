<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NFPA 2001 YH Clean Agent Design Platform</title>

<link rel="stylesheet" href="./style.css">

</head>

<body>

<div class="container">

<h1>NFPA 2001 YH Clean Agent Design Platform</h1>

<p class="subtitle">
Clean Agent Fire Suppression System Design – NFPA 2001
</p>

<div class="grid">

<div class="card">

<h2>Project Information</h2>

<input id="projectName" placeholder="Project Name">
<input id="clientName" placeholder="Client Name">
<input id="engineerName" placeholder="Engineer Name">
<input id="email" placeholder="Engineer Email">

</div>


<div class="card">

<h2>Agent Selection</h2>

<label>Agent Type</label>

<select id="agentType">

<option value="fm200">FM-200</option>
<option value="fk">FK-5-1-12</option>

</select>

<label>Display Name</label>

<input id="displayName" readonly>

<label>Chemical Name</label>

<input id="chemicalName" readonly>

</div>


<div class="card">

<h2>Room Data</h2>

<input id="roomName" placeholder="Room Name">

<input id="roomLength" placeholder="Length (m)" type="number">

<input id="roomWidth" placeholder="Width (m)" type="number">

<input id="roomHeight" placeholder="Height (m)" type="number">

<div class="volumeBox">

Room Volume : <span id="volume">0</span> m³

</div>

</div>


<div class="card">

<h2>NFPA 2001 Hazard</h2>

<select id="hazardType">

<option>Electrical / Electronic Equipment</option>
<option>Normally Occupied Enclosure</option>
<option>Normally Unoccupied Enclosure</option>
<option>Class A Surface Fire</option>
<option>Archive / Data / Telecom Room</option>
<option>Flammable Liquid Hazard</option>

</select>

<input id="designConc" value="7.9" placeholder="Design Concentration %">

<input id="tempMin" value="20" placeholder="Min Temp °C">

<input id="tempMax" value="30" placeholder="Max Temp °C">

<input id="altitude" value="0" placeholder="Altitude m">

<input id="discharge" value="10" placeholder="Discharge Time sec">

</div>


<div class="card">

<h2>Hardware</h2>

<input id="pressure" value="42" placeholder="Cylinder Pressure bar">

<input id="nozzles" value="1" placeholder="Nozzle Count">

<select id="pipe">

<option>Schedule 40</option>
<option>Schedule 80</option>
<option>Stainless Steel</option>

</select>

</div>


<div class="card full">

<h2>Engineering Notes</h2>

<textarea id="notes"></textarea>

</div>

</div>


<button class="runButton" onclick="runCalculation()">

Run Calculation

</button>


<div class="resultCard">

<h2>Webhook Response</h2>

<pre id="result">No response yet</pre>

</div>

</div>


<script src="./app.js"></script>

</body>

</html>
